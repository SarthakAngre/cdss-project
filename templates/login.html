<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CDSS – Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b1120;
    --surface: #111827;
    --border: #1e2d45;
    --teal: #0d9488;
    --teal-light: #14b8a6;
    --teal-glow: rgba(13,148,136,0.15);
    --text: #e2e8f0;
    --muted: #64748b;
    --error: #ef4444;
    --accent: #f0abfc;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 60%, rgba(13,148,136,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(240,171,252,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 60px rgba(13,148,136,0.08), 0 20px 60px rgba(0,0,0,0.4);
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 30px; right: 30px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--teal), var(--accent), var(--teal), transparent);
    border-radius: 0 0 4px 4px;
  }
  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 26px;
    box-shadow: 0 0 30px rgba(13,148,136,0.4);
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  h1 span { color: var(--teal-light); }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px var(--teal-glow);
  }
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 11px 14px;
    color: #fca5a5;
    font-size: 13px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  button[type=submit] {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(13,148,136,0.35);
    margin-top: 8px;
  }
  button[type=submit]:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,148,136,0.4); }
  button[type=submit]:active { transform: translateY(0); }
  .hint {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .hint code {
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--teal-light);
    font-size: 11px;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="logo-area">
    <div class="logo-icon">🏥</div>
    <h1>CDSS <span>Portal</span></h1>
    <p class="subtitle">Clinical Decision Support System</p>
  </div>
  {% if error %}
  <div class="error-msg">⚠ {{ error }}</div>
  {% endif %}
  <form method="post" action="/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter your username" autocomplete="username" required/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
    </div>
    <button type="submit">Sign In →</button>
  </form>
  <p class="hint">Demo — <code>admin / admin123</code> or <code>doctor / clinic456</code></p>
</div>
</body>
</html>
